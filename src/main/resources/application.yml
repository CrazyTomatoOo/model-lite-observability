spring:
  application:
    name: model-lite-observability
  
  main:
    banner-mode: 'off'

server:
  port: 8080
  servlet:
    context-path: /model/observability/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

  prometheus:
    url: ${PROMETHEUS_URL:http://localhost:9090}
    timeout: 30s
    max-retries: 3
  kubernetes:
    namespace: ${K8S_NAMESPACE:default}
    config-path: ${KUBECONFIG:}
  cache:
    metrics-ttl: 5m
    services-ttl: 5m
    max-size: 1000

logging:
  level:
    com.modelengine.observability: INFO
  pattern:
    console: "[%d{yyyy-MM-dd'T'HH:mm:ss'Z'}] [%level] [observability] %msg%n"
observability:
  cluster-id: ${CLUSTER_ID:default}
  me-version: ${ME_VERSION:1.0.0}
  metrics:
    refresh-interval: 60s
    definitions:
      - metric-name: ttft
        promql-template: 'ttft_ms{pod="%s"}'
        display-name: Time To First Token
        unit: ms
        aggregation-type: AVG
      - metric-name: tpot
        promql-template: 'tpot_ms{pod="%s"}'
        display-name: Time Per Output Token
        unit: ms
        aggregation-type: AVG
      - metric-name: generation_tokens
        promql-template: 'generation_tokens_total{pod="%s"}'
        display-name: Generation Tokens
        unit: tokens
        aggregation-type: SUM
      - metric-name: prompt_throughput
        promql-template: 'prompt_throughput{pod="%s"}'
        display-name: Prompt Throughput
        unit: tokens/s
        aggregation-type: AVG
      - metric-name: decode_throughput
        promql-template: 'decode_throughput{pod="%s"}'
        display-name: Decode Throughput
        unit: tokens/s
        aggregation-type: AVG
      - metric-name: qps
        promql-template: 'qps{pod="%s"}'
        display-name: Queries Per Second
        unit: qps
        aggregation-type: SUM
      - metric-name: connections
        promql-template: 'concurrent_connections{pod="%s"}'
        display-name: Concurrent Connections
        unit: connections
        aggregation-type: SUM
      - metric-name: success_rate
        promql-template: 'request_success_rate{pod="%s"}'
        display-name: Request Success Rate
        unit: '%'
        aggregation-type: WEIGHTED_AVG
      - metric-name: total_requests
        promql-template: 'api_calls_total{pod="%s"}'
        display-name: Total Requests
        unit: requests
        aggregation-type: SUM
      - metric-name: failed_requests
        promql-template: 'api_calls_failed{pod="%s"}'
        display-name: Failed Requests
        unit: requests
        aggregation-type: SUM
      - metric-name: success_requests
        promql-template: 'api_calls_success{pod="%s"}'
        display-name: Successful Requests
        unit: requests
        aggregation-type: SUM
