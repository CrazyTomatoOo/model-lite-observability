spring:
  application:
    name: model-lite-observability
  
  main:
    banner-mode: 'off'

server:
  port: 8080
  servlet:
    context-path: /model/observability/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

  cache:
    metrics-ttl: 5m
    services-ttl: 5m
    max-size: 1000

logging:
  level:
    com.modelengine.observability: INFO
  pattern:
    console: "[%d{yyyy-MM-dd'T'HH:mm:ss'Z'}] [%level] [observability] %msg%n"
observability:
  cluster-id: ${CLUSTER_ID:default}
  me-version: ${ME_VERSION:1.0.0}
  metrics:
    refresh-interval: 60s
    definitions:
      - metric-name: ttft
        promql-template: '(time_to_first_token_seconds_sum{model_name="%s"} / time_to_first_token_seconds_count{model_name="%s"}) * 1000'
        display-name: Time To First Token
        unit: ms
      - metric-name: tpot
        promql-template: '(time_per_output_token_seconds_sum{model_name="%s"} / time_per_output_token_seconds_count{model_name="%s"}) * 1000'
        display-name: Time Per Output Token
        unit: ms
      - metric-name: generation_tokens
        promql-template: 'generation_tokens_total{model_name="%s"}'
        display-name: Generation Tokens
        unit: tokens
      - metric-name: prompt_throughput
        promql-template: 'avg_prompt_throughput_toks_per_s{model_name="%s"}'
        display-name: Prompt Throughput
        unit: tokens/s
      - metric-name: decode_throughput
        promql-template: 'avg_generation_throughput_toks_per_s{model_name="%s"}'
        display-name: Decode Throughput
        unit: tokens/s
      - metric-name: qps
        promql-template: 'rate(request_received_total{model_name="%s"}[1m])'
        display-name: Queries Per Second
        unit: qps
      - metric-name: connections
        promql-template: 'num_requests_running{model_name="%s"}'
        display-name: Concurrent Connections
        unit: connections
      - metric-name: success_rate
        promql-template: '(request_success_total{model_name="%s"} / request_received_total{model_name="%s"}) * 100'
        display-name: Request Success Rate
        unit: '%'
      - metric-name: total_requests
        promql-template: 'request_received_total{model_name="%s"}'
        display-name: Total Requests
        unit: requests
      - metric-name: failed_requests
        promql-template: 'request_failed_total{model_name="%s"}'
        display-name: Failed Requests
        unit: requests
      - metric-name: success_requests
        promql-template: 'request_success_total{model_name="%s"}'
        display-name: Successful Requests
        unit: requests
