---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelinferences.modelengine.io
spec:
  group: modelengine.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                framework:
                  type: string
                frameworkVersion:
                  type: string
                replicas:
                  type: integer
                selector:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Running
                    - Pending
                    - Failed
                    - Unknown
                readyReplicas:
                  type: integer
                availableReplicas:
                  type: integer
  scope: Namespaced
  names:
    plural: modelinferences
    singular: modelinference
    kind: ModelInference
