---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: model-lite-observability-role
rules:
  - apiGroups:
      - modelengine.io
    resources:
      - modelinferences
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: model-lite-observability-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: model-lite-observability-role
subjects:
  - kind: ServiceAccount
    name: model-lite-observability
    namespace: model-engine
